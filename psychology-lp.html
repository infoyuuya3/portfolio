      radial-gradient(circle at 80% 72%, rgba(180,210,255,0.85) 0, rgba(180,210,255,0.85) 2px, transparent 3px),
      radial-gradient(circle at 75% 15%, rgba(255,255,255,0.95) 0, rgba(255,255,255,0.95) 3px, transparent 4px);
  }

  .psy-content {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
  }

  .psy-brand {
    text-align: center;
    font-size: 13px;
    letter-spacing: 4px;
    color: #b8d8f5;
    margin-bottom: 20px;
  }

  .psy-title {
    text-align: center;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 300;
    letter-spacing: 4px;
    line-height: 1.7;
    color: #f0f4ff;
    margin: 0 0 8px;
  }

  .psy-part {
    text-align: center;
    font-size: 14px;
    letter-spacing: 8px;
    color: #b8d8f5;
    margin-bottom: 40px;
  }

  .psy-video-wrap {
    background: rgba(10, 20, 70, 0.7);
    border: 1px solid rgba(140, 200, 240, 0.2);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 60px;
    box-shadow: 0 0 50px rgba(80, 140, 255, 0.18);
    position: relative;
    padding-top: 56.25%;
  }

  .psy-video-wrap iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .psy-cta-box {
    text-align: center;
    padding: 48px 24px;
    background: rgba(10, 18, 60, 0.75);
    border: 1px solid rgba(140, 200, 240, 0.18);
    border-radius: 16px;
  }

  .psy-cta-eyebrow {
    font-size: 13px;
    letter-spacing: 4px;
    color: #b8d8f5;
    margin-bottom: 20px;
  }

  .psy-cta-text {
    font-size: clamp(16px, 2.5vw, 19px);
    font-weight: 300;
    line-height: 2;
    margin-bottom: 24px;
    color: #eef2ff;
  }

  .psy-cta-list {
    list-style: none;
    margin: 0 auto 36px;
    padding: 0;
    display: inline-block;
    text-align: left;
  }

  .psy-cta-list li {
    font-size: clamp(15px, 2.5vw, 17px);
    color: #e8f4ff;
    line-height: 1.8;
    padding-left: 20px;
    position: relative;
    margin-bottom: 4px;
  }

  .psy-cta-list li::before {
    content: '✦';
    position: absolute;
    left: 0;
    font-size: 10px;
    top: 6px;
    color: #8cc8f0;
  }

  .psy-btn {
    display: inline-block;
    background: linear-gradient(135deg, #2864d0, #5ab4ff);
    color: #fff;
    text-decoration: none;
    padding: 20px 52px;
    border-radius: 50px;
    font-size: 17px;
    letter-spacing: 2px;
    font-family: inherit;
    box-shadow: 0 4px 30px rgba(90, 180, 255, 0.5);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .psy-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 45px rgba(90, 180, 255, 0.7);
  }

  .psy-footer {
    text-align: center;
    margin-top: 60px;
    font-size: 12px;
    color: #2a3a6a;
    letter-spacing: 2px;
  }

    .psy-wrap { padding: 40px 16px 60px; }
    .psy-title { font-size: 26px; letter-spacing: 2px; }
    .psy-part { font-size: 13px; letter-spacing: 5px; }
    .psy-brand { font-size: 12px; }
    .psy-cta-box { padding: 36px 16px; }
    .psy-cta-text { font-size: 17px; line-height: 1.8; }
    .psy-btn { font-size: 16px; padding: 18px 36px; width: 100%; }
  }

  @keyframes twinkleA {
    0%   { opacity: 0.4; }
    100% { opacity: 1; }
  }
  @keyframes twinkleB {
    0%   { opacity: 1; }
    100% { opacity: 0.3; }

<body>

<div class="psy-wrap">

  <div class="psy-content">
